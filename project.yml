name: Twins
options:
  bundleIdPrefix: com.lucasotw
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: fr
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: HY6ZSGAUP6
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # iPhone en iOS 27 + Xcode 26 : le « debug dylib » et les checkers injectés
    # par Xcode plantent au lancement (-[OS_dispatch_mach_msg _setContext:]).
    # On désactive le debug dylib (lancement monolithique, stable).
    ENABLE_DEBUG_DYLIB: NO

targets:
  Twins:
    type: application
    platform: iOS
    sources:
      - path: Twins
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucasotw.twins
        PRODUCT_NAME: Twins
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Twins/Info.plist
      properties:
        CFBundleDisplayName: Twins
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark

schemes:
  Twins:
    build:
      targets:
        Twins: all
    run:
      config: Debug
      # iOS 27 + Xcode 26 : l'attachement du débogueur LLDB échoue (SIGKILL au
      # lancement). On lance SANS débogueur — l'app s'installe et tourne
      # normalement (pas de breakpoints tant qu'Xcode ne supporte pas iOS 27).
      debugEnabled: false
      # Checkers runtime désactivés : en version 26, ils plantent sur un device
      # iOS 27 (incompat de version). Cf aussi le patch TPC après génération.
      disableMainThreadChecker: true
      # NB: la config StoreKit n'est PAS câblée ici volontairement — sur un
      # device physique, Xcode + StoreKitTest plantent au lancement
      # (-[OS_dispatch_mach_msg _setContext:]: unrecognized selector).
      # Pour tester les achats EN SIMULATEUR : Product > Scheme > Edit Scheme >
      # Run > Options > StoreKit Configuration = Twins.storekit.
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
